<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NFC Portal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      padding: 24px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1a202c;
      text-align: center;
    }
    .line-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: #06C755;
      color: white;
      font-size: 17px;
      font-weight: 700;
      border-radius: 14px;
      padding: 16px 32px;
      text-decoration: none;
    }
    .line-btn:hover { background: #05a847; }
  </style>
</head>
<body>
  <h1>NFC タグ 検出</h1>
  <a id="lineBtn" class="line-btn" href="#">
    <svg width="26" height="26" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
      <rect width="48" height="48" rx="10" fill="white"/>
      <path d="M24 8C15.163 8 8 14.268 8 22c0 5.455 3.497 10.207 8.748 12.885-.384 1.432-1.393 5.197-1.596 6.002-.248.993.363.98.764.713.313-.207 4.976-3.387 6.99-4.757A19.3 19.3 0 0024 37c8.837 0 16-6.268 16-14S32.837 8 24 8z" fill="#06C755"/>
      <path d="M20.5 25.5h-2v-7h2v7zm4.5 0h-2l-3-4.5v4.5h-2v-7h2l3 4.5V18.5h2v7zm4 0h-5v-7h5v1.75h-3v1h3v1.75h-3v.75h3V25.5zm4-5.25h-2v5.25h-2V20.25h-2V18.5h6v1.75z" fill="white"/>
    </svg>
    LINEで通知する
  </a>
  <script>
    var params = new URLSearchParams(window.location.search);
    var nfcId = params.get("id") || "TAG-UNKNOWN";
    var now = new Date();
    var message = encodeURIComponent("【NFC通知】\\nTag ID: " + nfcId + "\\n時刻: " + now.toLocaleString("ja-JP"));
    document.getElementById("lineBtn").href = "https://line.me/R/share?text=" + message;
  </script>
</body>
</html>
